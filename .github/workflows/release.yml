name: Build Release APK

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: [ normal, fdroid ]

    steps:
      - uses: actions/checkout@v6

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android-SDK
        uses: android-actions/setup-android@v4

      - name: Create files for signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
        run: |
          echo $SIGNING_KEY | base64 -di > ./booming_keystore.jks
          echo $SIGNING_PROPERTIES | base64 -di > ./keystore.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build app
        env:
          BUILD_VARIANT: ${{ matrix.variant == 'normal' && 'Normal' || 'Fdroid' }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: ./gradlew assemble${{ env.BUILD_VARIANT }}Release

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apk-${{ matrix.variant }}-release
          path: app/build/outputs/apk/*/release/BoomingMusic-*.apk

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: > # TEMPORARY: Prevent releases for alpha/beta/rc tags.
      !contains(github.ref_name, 'alpha') && 
      !contains(github.ref_name, 'beta') && 
      !contains(github.ref_name, 'rc')

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v8
        with:
          path: release-apks
          pattern: apk-*-release
          merge-multiple: true

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Github Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: |
            release-apks/*/release/BoomingMusic-*.apk
