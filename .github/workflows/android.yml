name: Android 16 (API 36) Debug Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintNormalDebug  # 改为具体变体

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'zulu'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: ''

    - name: Install Android 16 SDK Platform and Build Tools
      run: |
        echo y | sdkmanager "platforms;android-36"
        echo y | sdkmanager "build-tools;36.0.0"
        echo y | sdkmanager "platform-tools"
        echo y | sdkmanager "tools"

    - name: Verify SDK installation
      run: |
        sdkmanager --list | grep "android-36" || true
        sdkmanager --list | grep "build-tools;36" || true

    - name: Build Debug APK for Android 16
      run: ./gradlew assembleNormalDebug  # 假设你的变体是 Normal，根据实际情况调整

    - name: Run Unit Tests
      run: ./gradlew testNormalDebugUnitTest  # 改为具体变体

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: android-16-debug-apk
        path: app/build/outputs/apk/*/debug/*.apk  # 通配匹配变体目录

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: app/build/reports/tests/