name: Android 16 (API 36) Debug Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'zulu'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      # 不安装任何额外包，后续手动安装
      with:
        packages: ''

    - name: Install Android 16 SDK Platform and Build Tools
      run: |
        # 安装 API 36 的 SDK 平台和构建工具
        echo y | sdkmanager "platforms;android-36"
        echo y | sdkmanager "build-tools;36.0.0"
        # 确保 platform-tools 已安装（adb 等）
        echo y | sdkmanager "platform-tools"
        echo y | sdkmanager "tools"

    - name: Verify SDK installation
      run: |
        sdkmanager --list | grep "android-36" || true
        sdkmanager --list | grep "build-tools;36" || true

    - name: Build Debug APK for Android 16
      run: ./gradlew assembleDebug

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: android-16-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: app/build/reports/tests/